<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Intelligence Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌦 Weather Intelligence Dashboard</h1>
<p class="subtitle">Live Weather Data Using OpenWeather API</p>

<div id="clock"></div>

<div class="search-box">
<input type="text" id="cityInput" placeholder="Search City...">
<button id="searchBtn">Search</button>
</div>

<div class="hero">

<div id="weatherIcon">🌤️</div>

<h2 id="cityName">Search a City</h2>


<h1 id="temp">--°C</h1>

<p id="condition">Weather Condition</p>

</div>

<div class="dashboard">

<div class="card">
<h3>🤗 Feels Like</h3>
<p id="feelsLike">--</p>
</div>

<div class="card">
<h3>💧 Humidity</h3>
<p id="humidity">--</p>
</div>

<div class="card">
<h3>🌬 Wind Speed</h3>
<p id="wind">--</p>
</div>

<div class="card">
<h3>🔥 Weather Status</h3>
<p id="status">--</p>
</div>

<div class="card">
<h3>💡 Advice</h3>
<p id="advice">--</p>
</div>

<div class="card">
<h3>🌿 Air Quality</h3>
<p id="airQuality">--</p>
</div>

<div class="card">
<h3>🏃 Outdoor Activity</h3>
<p id="outdoor">--</p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
